# Redirect waitlist API to Netlify Function (stores signups in Netlify Blobs)
[[redirects]]
  from = "/api/join-waitlist"
  to = "/.netlify/functions/join-waitlist"
  status = 200
  force = true

# Protected admin: fetch waitlist (with optional date/duration filters)
[[redirects]]
  from = "/api/admin/waitlist"
  to = "/.netlify/functions/get-waitlist"
  status = 200
  force = true

# Protected admin: update waitlist status (PATCH)
[[redirects]]
  from = "/api/admin/waitlist-update"
  to = "/.netlify/functions/update-waitlist-status"
  status = 200
  force = true

# Public: get spots taken count
[[redirects]]
  from = "/api/spots-taken"
  to = "/.netlify/functions/spots-taken"
  status = 200
  force = true
